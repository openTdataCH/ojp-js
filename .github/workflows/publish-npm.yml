name: Publish ojp-sdk on npm

on:
  push:
    branches:
      - fix/publish-workflow-s2
    tags:
      - '0.23.*'
  # allow manual trigger
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org/'

      - name: Install dependencies
        run: npm ci

      - name: Build package
        run: npm run build

      - name: Debug package
        run: npm pkg get name

      - name: Publish to npm
        run: npm publish --access public
